<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Post #04 — Qual classe voce nunca jogou?</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    padding: 40px;
  }

  .slide-label {
    font-family: 'JetBrains Mono', monospace;
    color: #666;
    font-size: 14px;
    margin-bottom: -30px;
  }

  .slide {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    background: #13131E;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 60px 50px;
  }
  .slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 700px 500px at 50% 45%, rgba(142,68,173,0.06) 0%, transparent 70%);
  }
  .slide::after {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1.5px solid rgba(142,68,173,0.2);
    border-radius: 2px;
    pointer-events: none;
  }

  .tag-purple {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: 4px;
    color: #8E44AD;
    background: rgba(142,68,173,0.12);
    border: 1px solid rgba(142,68,173,0.3);
    position: relative;
    z-index: 1;
  }

  .question {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 52px;
    color: #F5F0E8;
    text-align: center;
    line-height: 1.2;
    position: relative;
    z-index: 1;
    margin: 16px 0 12px;
  }
  .question em {
    font-style: normal;
    color: #D4A853;
  }

  /* Class grid */
  .class-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 860px;
    position: relative;
    z-index: 1;
    margin-top: 10px;
  }
  .class-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(212,168,83,0.12);
    border-radius: 12px;
    padding: 14px 10px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: all 0.3s;
  }
  .class-card:hover {
    background: rgba(212,168,83,0.08);
    border-color: rgba(212,168,83,0.3);
    transform: scale(1.02);
  }

  .class-icon {
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Pixel art class icons using SVG */
  .class-icon svg {
    width: 64px;
    height: 64px;
    image-rendering: pixelated;
  }

  .class-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: #F5F0E8;
    text-align: center;
  }

  .bottom-cta {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 26px;
    color: #9896A0;
    text-align: center;
    position: relative;
    z-index: 1;
    margin-top: auto;
    margin-bottom: 30px;
    line-height: 1.5;
  }
  .bottom-cta strong {
    color: #8E44AD;
  }

  .handle {
    position: absolute;
    bottom: 38px;
    left: 40px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 18px;
    color: rgba(212,168,83,0.5);
    z-index: 2;
  }
  .watermark {
    position: absolute;
    bottom: 25px;
    right: 25px;
    width: 70px;
    height: 70px;
    opacity: 0.18;
    z-index: 2;
  }

  /* Pixel-art-style icons via colored squares */
  .pixel-icon {
    display: grid;
    grid-template-columns: repeat(8, 8px);
    grid-template-rows: repeat(8, 8px);
    gap: 0;
  }
  .p { background: #D4A853; }
  .q { background: #E8C87A; }
  .r { background: #C0392B; }
  .b { background: #3498DB; }
  .g { background: #2ECC71; }
  .w { background: #F5F0E8; }
  .d { background: #8E44AD; }
  .o { background: #E67E22; }
  .k { background: #555; }
  .n { background: transparent; }

  /* Simplified approach: emoji-based for reliability */
  .class-emoji {
    font-size: 52px;
    line-height: 1;
    filter: saturate(0.8);
  }
</style>
</head>
