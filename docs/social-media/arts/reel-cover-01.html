<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Reel Cover — O que e o Pocket DM?</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    padding: 40px;
  }

  .slide-label {
    font-family: 'JetBrains Mono', monospace;
    color: #666;
    font-size: 14px;
    margin-bottom: -30px;
  }

  /* Reel cover is 1080x1920 but we also make a 1080x1080 thumbnail */

  .reel-cover {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
    background: #13131E;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 60px;
  }
  .reel-cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 800px at 50% 40%, rgba(212,168,83,0.08) 0%, transparent 70%),
      linear-gradient(180deg, transparent 0%, rgba(212,168,83,0.04) 100%);
  }
  .reel-cover::after {
    content: '';
    position: absolute;
    inset: 14px;
    border: 1.5px solid rgba(212,168,83,0.12);
    border-radius: 2px;
    pointer-events: none;
  }

  /* Gradient bottom */
  .gradient-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 400px;
    background: linear-gradient(180deg, transparent 0%, rgba(212,168,83,0.05) 100%);
    z-index: 1;
  }

  .reel-logo {
    width: 200px;
    height: 200px;
    position: relative;
    z-index: 2;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 40px rgba(212,168,83,0.4));
  }

  .reel-brand {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 64px;
    color: #D4A853;
    letter-spacing: 6px;
    position: relative;
    z-index: 2;
    text-shadow: 0 0 60px rgba(212,168,83,0.3);
  }

  .reel-sep {
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #D4A853, transparent);
    margin: 30px 0;
    position: relative;
    z-index: 2;
  }

  .reel-title {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 72px;
    color: #F5F0E8;
    text-align: center;
    line-height: 1.25;
    position: relative;
    z-index: 2;
    max-width: 800px;
  }
  .reel-title em {
    font-style: normal;
    color: #D4A853;
  }

  .reel-subtitle {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 34px;
    color: #9896A0;
    text-align: center;
    position: relative;
    z-index: 2;
    margin-top: 40px;
    line-height: 1.5;
  }

  .reel-play {
    width: 100px;
    height: 100px;
    border: 3px solid rgba(212,168,83,0.5);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
    margin-top: 60px;
    background: rgba(212,168,83,0.1);
  }
  .reel-play::after {
    content: '';
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 20px 0 20px 36px;
    border-color: transparent transparent transparent #D4A853;
    margin-left: 6px;
  }

  .reel-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    color: #D4A853;
    letter-spacing: 6px;
    text-transform: uppercase;
    position: absolute;
    bottom: 120px;
    z-index: 2;
  }
  .reel-handle {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 24px;
    color: rgba(212,168,83,0.5);
    position: absolute;
    bottom: 70px;
    z-index: 2;
  }

  /* ===== THUMBNAIL 1080x1080 ===== */
  .thumb {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    background: #13131E;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
  }
  .thumb::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 600px 400px at 50% 45%, rgba(212,168,83,0.08) 0%, transparent 70%);
  }
  .thumb::after {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1.5px solid rgba(212,168,83,0.12);
    border-radius: 2px;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- ===== REEL COVER 1080x1920 ===== -->
<p class="slide-label">Reel Cover — 1080x1920 (vertical)</p>
<div class="reel-cover">
  <div class="gradient-bottom"></div>

  <svg class="reel-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><defs><linearGradient id="wg1" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#e8c87a"/><stop offset="50%" stop-color="#d4a853"/><stop offset="100%" stop-color="#b8903d"/></linearGradient></defs><g stroke="url(#wg1)" stroke-linejoin="round" fill="none"><g stroke-linecap="round"><path stroke-width="10" d="m256 110 123 75v150l-123 75-123-75V185z"/><path stroke-width="6" d="m256 194-80 132h160z" opacity=".55"/><path stroke-width="5" d="m256 110-80 216M256 110l80 216M256 410l-80-84M256 410l80-84" opacity=".5"/><path stroke-width="4" d="m133 185 123 9M379 185l-123 9M133 185l43 141M379 185l-43 141M133 335l43-9M379 335l-43-9" opacity=".35"/></g><path fill="url(#wg1)" stroke-width="2" d="M130 174 110 37l85 55 61-88 61 88 85-55-20 137-126-82Z"/></g></svg>

  <div class="reel-brand">POCKET DM</div>
  <div class="reel-sep"></div>

  <div class="reel-title">Voce ainda gerencia combate no <em>papel</em>?</div>

  <div class="reel-subtitle">30 segundos pra mudar sua mesa<br>pra sempre.</div>

  <div class="reel-play"></div>

  <div class="reel-tag">Assista agora</div>
  <div class="reel-handle">@pocket.dm</div>
</div>

<!-- ===== THUMBNAIL 1080x1080 ===== -->
<p class="slide-label">Reel Thumbnail — 1080x1080 (para grid do Instagram)</p>
<div class="thumb">
  <svg style="width:160px; height:160px; position:relative; z-index:1; margin-bottom:20px; filter: drop-shadow(0 0 30px rgba(212,168,83,0.4));" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><defs><linearGradient id="wg2" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#e8c87a"/><stop offset="50%" stop-color="#d4a853"/><stop offset="100%" stop-color="#b8903d"/></linearGradient></defs><g stroke="url(#wg2)" stroke-linejoin="round" fill="none"><g stroke-linecap="round"><path stroke-width="10" d="m256 110 123 75v150l-123 75-123-75V185z"/><path stroke-width="6" d="m256 194-80 132h160z" opacity=".55"/><path stroke-width="5" d="m256 110-80 216M256 110l80 216M256 410l-80-84M256 410l80-84" opacity=".5"/></g><path fill="url(#wg2)" stroke-width="2" d="M130 174 110 37l85 55 61-88 61 88 85-55-20 137-126-82Z"/></g></svg>

  <div style="font-family:'Cinzel',serif; font-weight:900; font-size:52px; color:#D4A853; letter-spacing:4px; position:relative; z-index:1; text-shadow: 0 0 40px rgba(212,168,83,0.3);">POCKET DM</div>

  <div style="width:150px; height:2px; background:linear-gradient(90deg,transparent,#D4A853,transparent); margin:25px 0; position:relative; z-index:1;"></div>

  <div style="font-family:'Cinzel',serif; font-weight:700; font-size:48px; color:#F5F0E8; text-align:center; line-height:1.3; position:relative; z-index:1; max-width:700px;">Voce ainda gerencia combate no <span style="color:#D4A853;">papel</span>?</div>

  <div style="width:70px; height:70px; border:3px solid rgba(212,168,83,0.5); border-radius:50%; display:flex; align-items:center; justify-content:center; position:relative; z-index:2; margin-top:40px; background:rgba(212,168,83,0.1);">
    <div style="width:0; height:0; border-style:solid; border-width:14px 0 14px 24px; border-color:transparent transparent transparent #D4A853; margin-left:4px;"></div>
  </div>

  <div style="font-family:'JetBrains Mono',monospace; font-size:16px; color:#D4A853; letter-spacing:4px; text-transform:uppercase; position:absolute; bottom:60px; z-index:2;">Assista o reel</div>
</div>

</body>
</html>
