name: E2E Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check secrets configured
        id: check
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "Supabase secrets not configured — skipping E2E."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.check.outputs.skip != 'true'
        run: npx playwright install --with-deps chromium

      - name: Build app
        if: steps.check.outputs.skip != 'true'
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Run E2E journey tests
        if: steps.check.outputs.skip != 'true'
        run: >
          npx playwright test
          e2e/journeys/dm-happy-path.spec.ts
          e2e/journeys/dm-reconnect.spec.ts
          e2e/journeys/guest-try-mode.spec.ts
          e2e/journeys/player-mobile.spec.ts
          --project=desktop-chrome
        env:
          CI: true
          E2E_DM_EMAIL: ${{ secrets.E2E_DM_EMAIL }}
          E2E_DM_PASSWORD: ${{ secrets.E2E_DM_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always() && steps.check.outputs.skip != 'true'
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always() && steps.check.outputs.skip != 'true'
        with:
          name: e2e-results
          path: e2e/results/
          retention-days: 7
