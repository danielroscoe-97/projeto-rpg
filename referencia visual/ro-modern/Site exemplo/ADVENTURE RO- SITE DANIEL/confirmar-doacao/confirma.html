
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
<title>AdvT RO - FORMULÁRIO</title>
<link href="_css/typo.css" rel="stylesheet" type="text/css" />
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" /><style type="text/css">

	background-image: url(img/001.html); width:100%; height:100%; background-repeat: no-repeat;

	color: #1AA9D9;
}

	color: #1AA9D9;

</style></head>


<body>
<div id="div">
	<p>
	  	<form id="frm" action="#" method="post" enctype="multipart/form-data">

	  <input type="hidden" name="frm_ok" />

			<fieldset>
				<legend>FORMULÁRIO DE CONTATO AdvT RO </legend><p>
					<label for="login">Login no jogo:</label>
					<input id="login" name="login" onKeyDown="if(event.keyCode==13) event.keyCode=9;" />
				</p>
				<p>
					<label for="email">E-mail:</label>
					<input id="email" name="email" onKeyDown="if(event.keyCode==13) event.keyCode=9;" />
				</p>
				<p>
				  <label for="mensagem">Anexo da Solicitação (caso necessário)</label>
					<input type="file" name="arquivo[]" size="50" class="file" />
				</p>
				<p>
				  <label for="mensagem">Descreva sua Solicitação:</label>
			      <textarea id="mensagem" name="mensagem" class="text"></textarea>
				</p>
				<p style="text-align:right; padding-right:10px;">
					<input type="submit" value="ENVIAR" class="clearfix" />
				</p>
			</fieldset>

		</form>

	
</div>
</body>

</html>
