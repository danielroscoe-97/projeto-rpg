<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f35"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow-l" cx="30%" cy="45%" r="30%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-r" cx="70%" cy="45%" r="30%">
      <stop offset="0%" stop-color="#D4A853" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#D4A853" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A853" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D4A853" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D4A853" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="600" height="630" fill="url(#glow-l)"/>
  <rect x="600" y="0" width="600" height="630" fill="url(#glow-r)"/>
  <!-- Divider line -->
  <line x1="600" y1="80" x2="600" y2="550" stroke="#D4A853" stroke-width="1" opacity="0.2"/>
  <text x="600" y="320" text-anchor="middle" font-family="serif" font-size="24" fill="#D4A853" opacity="0.5">VS</text>
  <rect x="0" y="610" width="1200" height="2" fill="url(#gold-line)"/>
  <rect x="0" y="18" width="1200" height="1" fill="url(#gold-line)" opacity="0.5"/>
  <!-- Left side: Combat Tracker (simple, sword) -->
  <g transform="translate(300,260)" opacity="0.6">
    <rect x="-60" y="-80" width="120" height="160" rx="8" fill="none" stroke="#a855f7" stroke-width="2"/>
    <!-- HP bar -->
    <rect x="-45" y="-50" width="90" height="8" rx="2" fill="#a855f7" opacity="0.15"/>
    <rect x="-45" y="-50" width="65" height="8" rx="2" fill="#22c55e" opacity="0.35"/>
    <rect x="-45" y="-30" width="90" height="8" rx="2" fill="#a855f7" opacity="0.15"/>
    <rect x="-45" y="-30" width="40" height="8" rx="2" fill="#f59e0b" opacity="0.35"/>
    <rect x="-45" y="-10" width="90" height="8" rx="2" fill="#a855f7" opacity="0.15"/>
    <rect x="-45" y="-10" width="80" height="8" rx="2" fill="#22c55e" opacity="0.35"/>
    <!-- Simple initiative list -->
    <text x="-45" y="30" font-family="monospace" font-size="11" fill="#a855f7" opacity="0.4">1. Goblin</text>
    <text x="-45" y="48" font-family="monospace" font-size="11" fill="#a855f7" opacity="0.35">2. Fighter</text>
    <text x="-45" y="66" font-family="monospace" font-size="11" fill="#a855f7" opacity="0.3">3. Dragon</text>
  </g>
  <text x="300" y="430" text-anchor="middle" font-family="serif" font-size="16" fill="#a855f7" opacity="0.4" letter-spacing="4">COMBAT TRACKER</text>
  <!-- Right side: VTT (grid + tokens) -->
  <g transform="translate(900,260)" opacity="0.6">
    <rect x="-80" y="-80" width="160" height="160" rx="8" fill="none" stroke="#D4A853" stroke-width="2"/>
    <!-- Grid -->
    <g stroke="#D4A853" stroke-width="0.5" opacity="0.15">
      <line x1="-80" y1="-40" x2="80" y2="-40"/>
      <line x1="-80" y1="0" x2="80" y2="0"/>
      <line x1="-80" y1="40" x2="80" y2="40"/>
      <line x1="-40" y1="-80" x2="-40" y2="80"/>
      <line x1="0" y1="-80" x2="0" y2="80"/>
      <line x1="40" y1="-80" x2="40" y2="80"/>
    </g>
    <!-- Tokens on grid -->
    <circle cx="-20" cy="-20" r="14" fill="#D4A853" opacity="0.2" stroke="#D4A853" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="14" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="-60" cy="60" r="14" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <text x="900" y="430" text-anchor="middle" font-family="serif" font-size="16" fill="#D4A853" opacity="0.4" letter-spacing="4">VIRTUAL TABLETOP</text>
  <!-- Corner ornaments -->
  <g stroke="#D4A853" stroke-width="1.5" fill="none" opacity="0.2">
    <path d="M30,30 L30,60 M30,30 L60,30"/>
    <path d="M1170,30 L1170,60 M1170,30 L1140,30"/>
    <path d="M30,600 L30,570 M30,600 L60,600"/>
    <path d="M1170,600 L1170,570 M1170,600 L1140,600"/>
  </g>
</svg>