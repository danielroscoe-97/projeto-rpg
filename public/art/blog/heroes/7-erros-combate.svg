<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f35"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A853" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D4A853" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D4A853" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="270" rx="450" ry="280" fill="url(#glow)"/>
  <rect x="0" y="610" width="1200" height="2" fill="url(#gold-line)"/>
  <rect x="0" y="18" width="1200" height="1" fill="url(#gold-line)" opacity="0.5"/>
  <!-- Warning triangle -->
  <g transform="translate(600,220)" opacity="0.6">
    <polygon points="0,-70 80,50 -80,50" fill="#f59e0b" opacity="0.06" stroke="#f59e0b" stroke-width="2.5"/>
    <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="50" fill="#f59e0b" opacity="0.5">!</text>
  </g>
  <!-- 7 X marks scattered -->
  <g stroke="#ef4444" stroke-width="3" opacity="0.2">
    <!-- X 1 -->
    <g transform="translate(250,180)"><line x1="-12" y1="-12" x2="12" y2="12"/><line x1="12" y1="-12" x2="-12" y2="12"/></g>
    <!-- X 2 -->
    <g transform="translate(380,350)"><line x1="-12" y1="-12" x2="12" y2="12"/><line x1="12" y1="-12" x2="-12" y2="12"/></g>
    <!-- X 3 -->
    <g transform="translate(200,400)"><line x1="-10" y1="-10" x2="10" y2="10"/><line x1="10" y1="-10" x2="-10" y2="10"/></g>
    <!-- X 4 -->
    <g transform="translate(950,170)"><line x1="-12" y1="-12" x2="12" y2="12"/><line x1="12" y1="-12" x2="-12" y2="12"/></g>
    <!-- X 5 -->
    <g transform="translate(850,360)"><line x1="-10" y1="-10" x2="10" y2="10"/><line x1="10" y1="-10" x2="-10" y2="10"/></g>
    <!-- X 6 -->
    <g transform="translate(1000,420)"><line x1="-12" y1="-12" x2="12" y2="12"/><line x1="12" y1="-12" x2="-12" y2="12"/></g>
    <!-- X 7 -->
    <g transform="translate(480,460)"><line x1="-10" y1="-10" x2="10" y2="10"/><line x1="10" y1="-10" x2="-10" y2="10"/></g>
  </g>
  <!-- Checkmark (the fix) -->
  <g transform="translate(600,420)" opacity="0.3">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#22c55e" stroke-width="2"/>
    <path d="M-10,0 L-3,8 L12,-10" fill="none" stroke="#22c55e" stroke-width="3"/>
  </g>
  <!-- "7" watermark -->
  <text x="600" y="380" text-anchor="middle" font-family="serif" font-size="250" fill="#ef4444" opacity="0.02">7</text>
  <!-- Corner ornaments -->
  <g stroke="#D4A853" stroke-width="1.5" fill="none" opacity="0.2">
    <path d="M30,30 L30,60 M30,30 L60,30"/>
    <path d="M1170,30 L1170,60 M1170,30 L1140,30"/>
    <path d="M30,600 L30,570 M30,600 L60,600"/>
    <path d="M1170,600 L1170,570 M1170,600 L1140,600"/>
  </g>
</svg>