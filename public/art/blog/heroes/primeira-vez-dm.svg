<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f35"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A853" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D4A853" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D4A853" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="270" rx="450" ry="280" fill="url(#glow)"/>
  <rect x="0" y="610" width="1200" height="2" fill="url(#gold-line)"/>
  <rect x="0" y="18" width="1200" height="1" fill="url(#gold-line)" opacity="0.5"/>
  <!-- DM Screen -->
  <g transform="translate(600,250)" opacity="0.6">
    <!-- Three-panel screen -->
    <rect x="-150" y="-80" width="100" height="160" rx="4" fill="#3b82f6" opacity="0.04" stroke="#3b82f6" stroke-width="1.5" transform="rotate(-8)"/>
    <rect x="-50" y="-80" width="100" height="160" rx="4" fill="#3b82f6" opacity="0.06" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="50" y="-80" width="100" height="160" rx="4" fill="#3b82f6" opacity="0.04" stroke="#3b82f6" stroke-width="1.5" transform="rotate(8)"/>
    <!-- Content lines on center panel -->
    <rect x="-35" y="-60" width="70" height="5" rx="1" fill="#D4A853" opacity="0.15"/>
    <rect x="-35" y="-45" width="50" height="4" rx="1" fill="#3b82f6" opacity="0.1"/>
    <rect x="-35" y="-35" width="60" height="4" rx="1" fill="#3b82f6" opacity="0.08"/>
    <rect x="-35" y="-25" width="40" height="4" rx="1" fill="#3b82f6" opacity="0.06"/>
  </g>
  <!-- Scroll with quill -->
  <g transform="translate(400,380)" opacity="0.5">
    <rect x="-25" y="-35" width="50" height="70" rx="4" fill="none" stroke="#D4A853" stroke-width="1.5"/>
    <ellipse cx="0" cy="-38" rx="28" ry="6" fill="none" stroke="#D4A853" stroke-width="1"/>
    <line x1="-15" y1="-18" x2="15" y2="-18" stroke="#D4A853" stroke-width="1" opacity="0.3"/>
    <line x1="-15" y1="-8" x2="10" y2="-8" stroke="#D4A853" stroke-width="1" opacity="0.25"/>
    <line x1="-15" y1="2" x2="15" y2="2" stroke="#D4A853" stroke-width="1" opacity="0.2"/>
  </g>
  <!-- Compass rose -->
  <g transform="translate(800,380)" opacity="0.45">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#D4A853" stroke-width="1.5"/>
    <polygon points="0,-30 6,-6 0,0 -6,-6" fill="#D4A853" opacity="0.3"/>
    <polygon points="0,30 6,6 0,0 -6,6" fill="#D4A853" opacity="0.15"/>
    <polygon points="-30,0 -6,-6 0,0 -6,6" fill="#D4A853" opacity="0.15"/>
    <polygon points="30,0 6,-6 0,0 6,6" fill="#D4A853" opacity="0.15"/>
    <circle cx="0" cy="0" r="4" fill="#D4A853" opacity="0.3"/>
  </g>
  <!-- "1st" badge -->
  <g transform="translate(600,480)" opacity="0.3">
    <rect x="-30" y="-14" width="60" height="28" rx="14" fill="none" stroke="#D4A853" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="14" fill="#D4A853">1st</text>
  </g>
  <!-- Corner ornaments -->
  <g stroke="#D4A853" stroke-width="1.5" fill="none" opacity="0.2">
    <path d="M30,30 L30,60 M30,30 L60,30"/>
    <path d="M1170,30 L1170,60 M1170,30 L1140,30"/>
    <path d="M30,600 L30,570 M30,600 L60,600"/>
    <path d="M1170,600 L1170,570 M1170,600 L1140,600"/>
  </g>
</svg>