<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f35"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A853" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D4A853" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D4A853" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="280" rx="450" ry="280" fill="url(#glow)"/>
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
  </g>
  <rect x="0" y="610" width="1200" height="2" fill="url(#gold-line)"/>
  <rect x="0" y="18" width="1200" height="1" fill="url(#gold-line)" opacity="0.5"/>
  <!-- 5 tool icons in a row -->
  <!-- 1: Shield (AC) -->
  <g transform="translate(240,280)" opacity="0.7">
    <path d="M0,-45 L35,-30 L35,15 L0,45 L-35,15 L-35,-30 Z" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <path d="M0,-45 L35,-30 L35,15 L0,45 L-35,15 L-35,-30 Z" fill="#f59e0b" opacity="0.06"/>
    <text x="0" y="8" text-anchor="middle" font-family="serif" font-size="20" fill="#f59e0b" opacity="0.6">AC</text>
  </g>
  <!-- 2: Scroll (Bestiary) -->
  <g transform="translate(420,280)" opacity="0.7">
    <rect x="-22" y="-40" width="44" height="80" rx="4" fill="none" stroke="#D4A853" stroke-width="2"/>
    <line x1="-12" y1="-22" x2="12" y2="-22" stroke="#D4A853" stroke-width="1.5" opacity="0.5"/>
    <line x1="-12" y1="-10" x2="12" y2="-10" stroke="#D4A853" stroke-width="1.5" opacity="0.4"/>
    <line x1="-12" y1="2" x2="8" y2="2" stroke="#D4A853" stroke-width="1.5" opacity="0.3"/>
    <line x1="-12" y1="14" x2="12" y2="14" stroke="#D4A853" stroke-width="1.5" opacity="0.25"/>
    <ellipse cx="0" cy="-44" rx="24" ry="6" fill="none" stroke="#D4A853" stroke-width="1.5"/>
    <ellipse cx="0" cy="44" rx="24" ry="6" fill="none" stroke="#D4A853" stroke-width="1.5"/>
  </g>
  <!-- 3: Sword (Combat) -->
  <g transform="translate(600,280)" opacity="0.7">
    <rect x="-4" y="-50" width="8" height="70" rx="2" fill="#D4A853" opacity="0.35"/>
    <rect x="-25" y="18" width="50" height="8" rx="2" fill="#D4A853" opacity="0.3"/>
    <circle cx="0" cy="30" r="6" fill="#D4A853" opacity="0.25"/>
    <polygon points="0,-55 6,-50 -6,-50" fill="#D4A853" opacity="0.4"/>
  </g>
  <!-- 4: Star (Spells) -->
  <g transform="translate(780,280)" opacity="0.7">
    <polygon points="0,-40 12,-14 40,-14 18,6 26,35 0,18 -26,35 -18,6 -40,-14 -12,-14" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <polygon points="0,-40 12,-14 40,-14 18,6 26,35 0,18 -26,35 -18,6 -40,-14 -12,-14" fill="#f59e0b" opacity="0.06"/>
  </g>
  <!-- 5: D20 (Dice) -->
  <g transform="translate(960,280)" opacity="0.7">
    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" fill="none" stroke="#D4A853" stroke-width="2"/>
    <polygon points="0,-40 35,-20 0,0" fill="#D4A853" opacity="0.06"/>
    <text x="0" y="6" text-anchor="middle" font-family="serif" font-size="20" fill="#D4A853" opacity="0.5">d20</text>
  </g>
  <!-- Number 5 watermark -->
  <text x="600" y="500" text-anchor="middle" font-family="serif" font-size="120" fill="#D4A853" opacity="0.04">5</text>
  <!-- Corner ornaments -->
  <g stroke="#D4A853" stroke-width="1.5" fill="none" opacity="0.2">
    <path d="M30,30 L30,60 M30,30 L60,30"/>
    <path d="M1170,30 L1170,60 M1170,30 L1140,30"/>
    <path d="M30,600 L30,570 M30,600 L60,600"/>
    <path d="M1170,600 L1170,570 M1170,600 L1140,600"/>
  </g>
</svg>