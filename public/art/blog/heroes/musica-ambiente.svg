<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f35"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A853" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D4A853" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D4A853" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#D4A853" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="270" rx="450" ry="280" fill="url(#glow)"/>
  <rect x="0" y="610" width="1200" height="2" fill="url(#gold-line)"/>
  <rect x="0" y="18" width="1200" height="1" fill="url(#gold-line)" opacity="0.5"/>
  <!-- Musical notes floating -->
  <g opacity="0.5">
    <!-- Note 1 -->
    <g transform="translate(350,200)">
      <circle cx="0" cy="20" rx="10" ry="7" fill="#10b981" opacity="0.3"/>
      <line x1="10" y1="20" x2="10" y2="-25" stroke="#10b981" stroke-width="2" opacity="0.3"/>
      <path d="M10,-25 Q20,-30 15,-15" fill="#10b981" opacity="0.25"/>
    </g>
    <!-- Note 2 (double) -->
    <g transform="translate(550,160)">
      <ellipse cx="0" cy="30" rx="10" ry="7" fill="#D4A853" opacity="0.25"/>
      <ellipse cx="30" cy="25" rx="10" ry="7" fill="#D4A853" opacity="0.25"/>
      <line x1="10" y1="30" x2="10" y2="-15" stroke="#D4A853" stroke-width="2" opacity="0.25"/>
      <line x1="40" y1="25" x2="40" y2="-20" stroke="#D4A853" stroke-width="2" opacity="0.25"/>
      <line x1="10" y1="-15" x2="40" y2="-20" stroke="#D4A853" stroke-width="2.5" opacity="0.25"/>
    </g>
    <!-- Note 3 -->
    <g transform="translate(780,180)">
      <ellipse cx="0" cy="20" rx="10" ry="7" fill="#10b981" opacity="0.25"/>
      <line x1="10" y1="20" x2="10" y2="-25" stroke="#10b981" stroke-width="2" opacity="0.25"/>
      <path d="M10,-25 Q20,-30 15,-15" fill="#10b981" opacity="0.2"/>
    </g>
  </g>
  <!-- Sound waves -->
  <g transform="translate(600,310)" stroke="#10b981" fill="none" opacity="0.2">
    <path d="M-8,-25 Q-15,0 -8,25" stroke-width="2"/>
    <path d="M-18,-40 Q-30,0 -18,40" stroke-width="1.5"/>
    <path d="M-28,-55 Q-45,0 -28,55" stroke-width="1"/>
    <path d="M8,-25 Q15,0 8,25" stroke-width="2"/>
    <path d="M18,-40 Q30,0 18,40" stroke-width="1.5"/>
    <path d="M28,-55 Q45,0 28,55" stroke-width="1"/>
  </g>
  <!-- Candle -->
  <g transform="translate(600,420)" opacity="0.6">
    <rect x="-8" y="-20" width="16" height="50" rx="2" fill="#D4A853" opacity="0.15" stroke="#D4A853" stroke-width="1.5"/>
    <!-- Flame -->
    <path d="M0,-50 C10,-35 8,-25 0,-20 C-8,-25 -10,-35 0,-50Z" fill="url(#flame)"/>
    <ellipse cx="0" cy="-28" rx="4" ry="8" fill="#D4A853" opacity="0.3"/>
    <!-- Glow -->
    <circle cx="0" cy="-35" r="30" fill="#D4A853" opacity="0.04"/>
  </g>
  <!-- Corner ornaments -->
  <g stroke="#D4A853" stroke-width="1.5" fill="none" opacity="0.2">
    <path d="M30,30 L30,60 M30,30 L60,30"/>
    <path d="M1170,30 L1170,60 M1170,30 L1140,30"/>
    <path d="M30,600 L30,570 M30,600 L60,600"/>
    <path d="M1170,600 L1170,570 M1170,600 L1140,600"/>
  </g>
</svg>