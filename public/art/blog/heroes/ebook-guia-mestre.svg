<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f35"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A853" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D4A853" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D4A853" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="270" rx="450" ry="280" fill="url(#glow)"/>
  <rect x="0" y="610" width="1200" height="2" fill="url(#gold-line)"/>
  <rect x="0" y="18" width="1200" height="1" fill="url(#gold-line)" opacity="0.5"/>
  <!-- Open book -->
  <g transform="translate(600,280)" opacity="0.65">
    <!-- Left page -->
    <path d="M-5,-80 C-40,-80 -100,-75 -120,-60 L-120,70 C-100,55 -40,50 -5,50Z" fill="#10b981" opacity="0.04" stroke="#10b981" stroke-width="1.5"/>
    <!-- Right page -->
    <path d="M5,-80 C40,-80 100,-75 120,-60 L120,70 C100,55 40,50 5,50Z" fill="#10b981" opacity="0.04" stroke="#10b981" stroke-width="1.5"/>
    <!-- Spine -->
    <line x1="0" y1="-80" x2="0" y2="50" stroke="#D4A853" stroke-width="2" opacity="0.2"/>
    <!-- Text lines - left page -->
    <g opacity="0.2">
      <rect x="-100" y="-55" width="75" height="4" rx="1" fill="#D4A853"/>
      <rect x="-100" y="-42" width="60" height="3" rx="1" fill="#10b981"/>
      <rect x="-100" y="-32" width="70" height="3" rx="1" fill="#10b981"/>
      <rect x="-100" y="-22" width="50" height="3" rx="1" fill="#10b981"/>
      <rect x="-100" y="-6" width="65" height="4" rx="1" fill="#D4A853"/>
      <rect x="-100" y="8" width="55" height="3" rx="1" fill="#10b981"/>
      <rect x="-100" y="18" width="70" height="3" rx="1" fill="#10b981"/>
    </g>
    <!-- Text lines - right page -->
    <g opacity="0.15">
      <rect x="25" y="-55" width="75" height="4" rx="1" fill="#D4A853"/>
      <rect x="25" y="-42" width="65" height="3" rx="1" fill="#10b981"/>
      <rect x="25" y="-32" width="55" height="3" rx="1" fill="#10b981"/>
      <rect x="25" y="-22" width="70" height="3" rx="1" fill="#10b981"/>
      <rect x="25" y="-6" width="60" height="4" rx="1" fill="#D4A853"/>
      <rect x="25" y="8" width="70" height="3" rx="1" fill="#10b981"/>
    </g>
  </g>
  <!-- Crown above book -->
  <g transform="translate(600,150)" opacity="0.5">
    <path d="M-30,15 L-30,-5 L-18,-18 L-6,5 L0,-22 L6,5 L18,-18 L30,-5 L30,15Z" fill="#D4A853" opacity="0.15" stroke="#D4A853" stroke-width="2"/>
    <rect x="-32" y="15" width="64" height="6" rx="2" fill="#D4A853" opacity="0.15"/>
    <circle cx="0" cy="-10" r="3" fill="#D4A853" opacity="0.3"/>
  </g>
  <!-- "PDF" badge -->
  <g transform="translate(600,430)" opacity="0.35">
    <rect x="-30" y="-12" width="60" height="24" rx="4" fill="none" stroke="#D4A853" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="monospace" font-size="12" fill="#D4A853" font-weight="bold">PDF</text>
  </g>
  <!-- Download arrow -->
  <g transform="translate(600,475)" opacity="0.25">
    <line x1="0" y1="0" x2="0" y2="20" stroke="#10b981" stroke-width="2"/>
    <path d="M-8,14 L0,24 L8,14" fill="none" stroke="#10b981" stroke-width="2"/>
  </g>
  <!-- Corner ornaments -->
  <g stroke="#D4A853" stroke-width="1.5" fill="none" opacity="0.2">
    <path d="M30,30 L30,60 M30,30 L60,30"/>
    <path d="M1170,30 L1170,60 M1170,30 L1140,30"/>
    <path d="M30,600 L30,570 M30,600 L60,600"/>
    <path d="M1170,600 L1170,570 M1170,600 L1140,600"/>
  </g>
</svg>