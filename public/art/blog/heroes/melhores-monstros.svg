<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f35"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="40%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A853" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D4A853" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D4A853" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="270" rx="500" ry="300" fill="url(#glow)"/>
  <rect x="0" y="610" width="1200" height="2" fill="url(#gold-line)"/>
  <rect x="0" y="18" width="1200" height="1" fill="url(#gold-line)" opacity="0.5"/>
  <!-- Dragon silhouette -->
  <g transform="translate(600,260)" opacity="0.5">
    <!-- Wings -->
    <path d="M0,-20 C-40,-80 -150,-120 -200,-80 C-180,-60 -120,-40 -80,-30 C-130,-50 -170,-80 -190,-75 C-160,-40 -100,-10 -50,0Z" fill="#D4A853" opacity="0.12" stroke="#D4A853" stroke-width="1"/>
    <path d="M0,-20 C40,-80 150,-120 200,-80 C180,-60 120,-40 80,-30 C130,-50 170,-80 190,-75 C160,-40 100,-10 50,0Z" fill="#D4A853" opacity="0.12" stroke="#D4A853" stroke-width="1"/>
    <!-- Body -->
    <ellipse cx="0" cy="20" rx="40" ry="50" fill="#D4A853" opacity="0.08" stroke="#D4A853" stroke-width="1.5"/>
    <!-- Head -->
    <ellipse cx="0" cy="-40" rx="20" ry="25" fill="#D4A853" opacity="0.1" stroke="#D4A853" stroke-width="1.5"/>
    <!-- Eyes -->
    <circle cx="-8" cy="-45" r="3" fill="#ef4444" opacity="0.5"/>
    <circle cx="8" cy="-45" r="3" fill="#ef4444" opacity="0.5"/>
    <!-- Horns -->
    <path d="M-15,-60 C-20,-80 -25,-90 -15,-95" fill="none" stroke="#D4A853" stroke-width="1.5" opacity="0.3"/>
    <path d="M15,-60 C20,-80 25,-90 15,-95" fill="none" stroke="#D4A853" stroke-width="1.5" opacity="0.3"/>
    <!-- Tail -->
    <path d="M0,70 C20,100 60,120 80,110 C70,100 50,90 40,85" fill="none" stroke="#D4A853" stroke-width="1.5" opacity="0.2"/>
  </g>
  <!-- Monster token circles -->
  <g opacity="0.25">
    <circle cx="200" cy="180" r="20" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="280" cy="420" r="16" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="950" cy="200" r="18" fill="none" stroke="#a855f7" stroke-width="1.5"/>
    <circle cx="1000" cy="400" r="22" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="160" cy="350" r="14" fill="none" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <!-- "10" watermark -->
  <text x="600" y="520" text-anchor="middle" font-family="serif" font-size="120" fill="#D4A853" opacity="0.03">10</text>
  <!-- Corner ornaments -->
  <g stroke="#D4A853" stroke-width="1.5" fill="none" opacity="0.2">
    <path d="M30,30 L30,60 M30,30 L60,30"/>
    <path d="M1170,30 L1170,60 M1170,30 L1140,30"/>
    <path d="M30,600 L30,570 M30,600 L60,600"/>
    <path d="M1170,600 L1170,570 M1170,600 L1140,600"/>
  </g>
</svg>