<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f35"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A853" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D4A853" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D4A853" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="260" rx="450" ry="280" fill="url(#glow)"/>
  <rect x="0" y="610" width="1200" height="2" fill="url(#gold-line)"/>
  <rect x="0" y="18" width="1200" height="1" fill="url(#gold-line)" opacity="0.5"/>
  <!-- Crown logo (Pocket DM brand) -->
  <g transform="translate(600,200)" opacity="0.7">
    <path d="M-40,20 L-40,-10 L-25,-25 L-10,0 L0,-30 L10,0 L25,-25 L40,-10 L40,20Z" fill="#D4A853" opacity="0.15" stroke="#D4A853" stroke-width="2.5"/>
    <rect x="-42" y="20" width="84" height="8" rx="2" fill="#D4A853" opacity="0.2"/>
    <!-- Gems -->
    <circle cx="-25" cy="-5" r="4" fill="#D4A853" opacity="0.3"/>
    <circle cx="0" cy="-15" r="5" fill="#D4A853" opacity="0.35"/>
    <circle cx="25" cy="-5" r="4" fill="#D4A853" opacity="0.3"/>
  </g>
  <!-- App screen mockup -->
  <g transform="translate(600,360)" opacity="0.5">
    <rect x="-120" y="-60" width="240" height="120" rx="8" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect x="-120" y="-60" width="240" height="20" rx="8" fill="#3b82f6" opacity="0.08"/>
    <circle cx="-105" cy="-50" r="3" fill="#ef4444" opacity="0.3"/>
    <circle cx="-95" cy="-50" r="3" fill="#f59e0b" opacity="0.3"/>
    <circle cx="-85" cy="-50" r="3" fill="#22c55e" opacity="0.3"/>
    <!-- Content lines -->
    <rect x="-100" y="-28" width="80" height="6" rx="2" fill="#3b82f6" opacity="0.15"/>
    <rect x="-100" y="-16" width="120" height="6" rx="2" fill="#3b82f6" opacity="0.1"/>
    <!-- HP bars -->
    <rect x="-100" y="0" width="200" height="10" rx="3" fill="#3b82f6" opacity="0.08"/>
    <rect x="-100" y="0" width="140" height="10" rx="3" fill="#22c55e" opacity="0.2"/>
    <rect x="-100" y="16" width="200" height="10" rx="3" fill="#3b82f6" opacity="0.08"/>
    <rect x="-100" y="16" width="90" height="10" rx="3" fill="#f59e0b" opacity="0.2"/>
    <rect x="-100" y="32" width="200" height="10" rx="3" fill="#3b82f6" opacity="0.08"/>
    <rect x="-100" y="32" width="170" height="10" rx="3" fill="#22c55e" opacity="0.2"/>
  </g>
  <!-- Step numbers floating -->
  <g font-family="serif" fill="#D4A853" opacity="0.12">
    <text x="200" y="200" font-size="80">1</text>
    <text x="320" y="400" font-size="60">2</text>
    <text x="880" y="200" font-size="60">3</text>
    <text x="950" y="380" font-size="80">4</text>
  </g>
  <!-- Corner ornaments -->
  <g stroke="#D4A853" stroke-width="1.5" fill="none" opacity="0.2">
    <path d="M30,30 L30,60 M30,30 L60,30"/>
    <path d="M1170,30 L1170,60 M1170,30 L1140,30"/>
    <path d="M30,600 L30,570 M30,600 L60,600"/>
    <path d="M1170,600 L1170,570 M1170,600 L1140,600"/>
  </g>
</svg>