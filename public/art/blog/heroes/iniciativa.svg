<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f35"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A853" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D4A853" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D4A853" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="270" rx="450" ry="280" fill="url(#glow)"/>
  <rect x="0" y="610" width="1200" height="2" fill="url(#gold-line)"/>
  <rect x="0" y="18" width="1200" height="1" fill="url(#gold-line)" opacity="0.5"/>
  <!-- D20 die (large, central) -->
  <g transform="translate(600,240)" opacity="0.55">
    <polygon points="0,-80 70,-40 70,40 0,80 -70,40 -70,-40" fill="#10b981" opacity="0.04" stroke="#10b981" stroke-width="2"/>
    <!-- Inner facets -->
    <line x1="0" y1="-80" x2="0" y2="0" stroke="#10b981" stroke-width="1" opacity="0.15"/>
    <line x1="70" y1="-40" x2="0" y2="0" stroke="#10b981" stroke-width="1" opacity="0.15"/>
    <line x1="-70" y1="-40" x2="0" y2="0" stroke="#10b981" stroke-width="1" opacity="0.15"/>
    <text x="0" y="10" text-anchor="middle" font-family="serif" font-size="36" fill="#D4A853" opacity="0.45">20</text>
  </g>
  <!-- Initiative order list -->
  <g transform="translate(600,400)" opacity="0.5">
    <!-- Numbered list -->
    <g font-family="monospace" font-size="14">
      <text x="-120" y="0" fill="#D4A853" opacity="0.5">1.</text>
      <rect x="-95" y="-10" width="60" height="14" rx="3" fill="#22c55e" opacity="0.15"/>
      <text x="-90" y="2" fill="#22c55e" opacity="0.4" font-size="11">Rogue</text>

      <text x="-10" y="0" fill="#D4A853" opacity="0.4">2.</text>
      <rect x="15" y="-10" width="60" height="14" rx="3" fill="#3b82f6" opacity="0.15"/>
      <text x="20" y="2" fill="#3b82f6" opacity="0.4" font-size="11">Goblin</text>

      <text x="100" y="0" fill="#D4A853" opacity="0.3">3.</text>
      <rect x="125" y="-10" width="60" height="14" rx="3" fill="#f59e0b" opacity="0.15"/>
      <text x="130" y="2" fill="#f59e0b" opacity="0.4" font-size="11">Cleric</text>
    </g>
    <!-- Arrow indicating order -->
    <path d="M-130,15 L190,15" fill="none" stroke="#D4A853" stroke-width="1" opacity="0.2"/>
    <polygon points="190,15 182,11 182,19" fill="#D4A853" opacity="0.2"/>
  </g>
  <!-- Circular arrow (cycle) -->
  <g transform="translate(600,240)" opacity="0.2">
    <path d="M-100,0 A100,100 0 1,1 -50,-87" fill="none" stroke="#D4A853" stroke-width="1.5" stroke-dasharray="8,6"/>
    <polygon points="-50,-87 -55,-75 -40,-80" fill="#D4A853"/>
  </g>
  <!-- Corner ornaments -->
  <g stroke="#D4A853" stroke-width="1.5" fill="none" opacity="0.2">
    <path d="M30,30 L30,60 M30,30 L60,30"/>
    <path d="M1170,30 L1170,60 M1170,30 L1140,30"/>
    <path d="M30,600 L30,570 M30,600 L60,600"/>
    <path d="M1170,600 L1170,570 M1170,600 L1140,600"/>
  </g>
</svg>