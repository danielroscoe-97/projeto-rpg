<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 680" fill="none">
  <!--
    Pocket DM — Crown d20 Logo (Full variant)
    Icon + "POCKET DM" + tagline "Master your table."
  -->
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C87A"/>
      <stop offset="50%" stop-color="#D4A853"/>
      <stop offset="100%" stop-color="#B8903D"/>
    </linearGradient>
    <linearGradient id="goldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDCF82"/>
      <stop offset="50%" stop-color="#D4A853"/>
      <stop offset="100%" stop-color="#B89040"/>
    </linearGradient>
    <linearGradient id="goldGradH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B8903D"/>
      <stop offset="50%" stop-color="#D4A853"/>
      <stop offset="100%" stop-color="#B8903D"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- === Crown d20 Icon (centered, ~390px) === -->
  <g transform="translate(56, 10) scale(0.78)" filter="url(#glow)">
    <!-- D20 -->
    <g stroke="url(#goldGrad)" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <polygon points="256,110 379,185 379,335 256,410 133,335 133,185" stroke-width="12"/>
      <polygon points="256,194 176,326 336,326" stroke-width="7" opacity="0.55"/>
      <line x1="256" y1="110" x2="176" y2="326" stroke-width="6" opacity="0.5"/>
      <line x1="256" y1="110" x2="336" y2="326" stroke-width="6" opacity="0.5"/>
      <line x1="256" y1="410" x2="176" y2="326" stroke-width="6" opacity="0.5"/>
      <line x1="256" y1="410" x2="336" y2="326" stroke-width="6" opacity="0.5"/>
      <line x1="133" y1="185" x2="256" y2="194" stroke-width="5" opacity="0.35"/>
      <line x1="379" y1="185" x2="256" y2="194" stroke-width="5" opacity="0.35"/>
      <line x1="133" y1="185" x2="176" y2="326" stroke-width="5" opacity="0.35"/>
      <line x1="379" y1="185" x2="336" y2="326" stroke-width="5" opacity="0.35"/>
      <line x1="133" y1="335" x2="176" y2="326" stroke-width="5" opacity="0.35"/>
      <line x1="379" y1="335" x2="336" y2="326" stroke-width="5" opacity="0.35"/>
    </g>
    <!-- Crown -->
    <path d="M 130,174 L 110,37 L 195,92 L 256,4 L 317,92 L 402,37 L 382,174 L 256,92 Z"
      fill="url(#goldFill)" stroke="url(#goldGrad)" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- === "POCKET DM" Text === -->
  <text x="256" y="530"
    font-family="Cinzel, 'Times New Roman', serif"
    font-weight="700"
    font-size="64"
    letter-spacing="8"
    fill="url(#goldGrad)"
    text-anchor="middle"
  >POCKET DM</text>

  <!-- === Ornamental divider === -->
  <line x1="140" y1="558" x2="372" y2="558"
    stroke="url(#goldGradH)" stroke-width="1" opacity="0.4"/>
  <circle cx="256" cy="558" r="2.5" fill="#D4A853" opacity="0.6"/>

  <!-- === Tagline === -->
  <text x="256" y="600"
    font-family="'Plus Jakarta Sans', 'Helvetica Neue', sans-serif"
    font-weight="400"
    font-size="24"
    letter-spacing="3"
    fill="#9896A0"
    text-anchor="middle"
    font-style="italic"
  >Master your table.</text>
</svg>
