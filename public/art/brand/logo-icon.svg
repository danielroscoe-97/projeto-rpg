<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    Pocket DM — Crown d20 Logo (Icon variant)
    v12 — crown wider base wrapping hex upper vertices
  -->
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C87A"/>
      <stop offset="50%" stop-color="#D4A853"/>
      <stop offset="100%" stop-color="#B8903D"/>
    </linearGradient>
    <linearGradient id="goldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDCF82"/>
      <stop offset="50%" stop-color="#D4A853"/>
      <stop offset="100%" stop-color="#B89040"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <g filter="url(#glow)">

    <!-- ══ D20 (behind) ══ -->
    <g stroke="url(#goldGrad)" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <polygon points="256,110 379,185 379,335 256,410 133,335 133,185" stroke-width="10"/>
      <polygon points="256,194 176,326 336,326" stroke-width="6" opacity="0.55"/>
      <line x1="256" y1="110" x2="176" y2="326" stroke-width="5" opacity="0.5"/>
      <line x1="256" y1="110" x2="336" y2="326" stroke-width="5" opacity="0.5"/>
      <line x1="256" y1="410" x2="176" y2="326" stroke-width="5" opacity="0.5"/>
      <line x1="256" y1="410" x2="336" y2="326" stroke-width="5" opacity="0.5"/>
      <line x1="133" y1="185" x2="256" y2="194" stroke-width="4" opacity="0.35"/>
      <line x1="379" y1="185" x2="256" y2="194" stroke-width="4" opacity="0.35"/>
      <line x1="133" y1="185" x2="176" y2="326" stroke-width="4" opacity="0.35"/>
      <line x1="379" y1="185" x2="336" y2="326" stroke-width="4" opacity="0.35"/>
      <line x1="133" y1="335" x2="176" y2="326" stroke-width="4" opacity="0.35"/>
      <line x1="379" y1="335" x2="336" y2="326" stroke-width="4" opacity="0.35"/>
    </g>

    <!-- ══ CROWN (on top) — base wraps around hex upper vertices ══ -->
    <path
      d="
        M 130,174
        L 110,37
        L 195,92
        L 256,4
        L 317,92
        L 402,37
        L 382,174
        L 256,92
        Z
      "
      fill="url(#goldFill)"
      stroke="url(#goldGrad)"
      stroke-width="2"
      stroke-linejoin="round"
    />

  </g>
</svg>
